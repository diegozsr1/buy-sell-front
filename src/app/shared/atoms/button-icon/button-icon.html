<!-- Botón con est -->
<div class="d-inline-flex flex-column align-items-center gap-1"  
  [style.--size]="size()" >
  <button type="button" 
    [class]="btnClass()"    
    (click)="onClick()">   
    
    @if (text_icon()) {
      <span class="text--icon">{{ text_icon() }}</span>
    } @else {
      <i [class]="iconClass()"></i>
    }
  </button>
   @if (label_text()) {
    <span [class]="labelClass()">{{ label_text() }}</span>
  }
</div>
