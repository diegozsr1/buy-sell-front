<section class="profile">

  <!-- Cabecera de perfil -->
  <div class="profile-header">
    <atom-icon variant="profile-primary-square" [text_icon]="iniciales" size="1.8rem"></atom-icon>
    <div class="profile-header__info">
      <p class="profile-name">{{ nombreCorto }}</p>
      <p class="profile-sub">Vendedor · Miembro desde {{ desde }}</p>
      <div class="profile-badges">
        <atom-badge variant="Verificado" icon="shield-check"></atom-badge>
      </div>
    </div>
    <a class="profile-edit" [routerLink]="['/user/edit-profile', userId]">Editar perfil</a>
  </div>

  <!-- Estadísticas -->
  <div class="profile-stats">
    <molecule-status-card align="left" [status]="publicados.toString()" text="PUBLICADOS"></molecule-status-card>
    <molecule-status-card align="left" [status]="vendidos.toString()" text="VENDIDOS"></molecule-status-card>
    <molecule-status-card align="left" [status]="valoracion" text="VALORACIÓN"></molecule-status-card>
  </div>

  <!-- Accesos rápidos (reutiliza management-card del equipo) -->
  <div class="profile-nav">
    <molecule-management-card
      icon="tag"
      link="/user/panel/sales"
      title="Ventas"
      [text]="publicados + ' activos · ' + vendidos + ' vendidos'">
    </molecule-management-card>
    <molecule-management-card
      icon="cube"
      link="/user/panel/my-purchases"
      title="Compras"
      text="5 compras">
    </molecule-management-card>
    <molecule-management-card
      icon="heart"
      link="/user/panel/favorites"
      title="Favoritos"
      text="12 guardados">
    </molecule-management-card>
    <!-- TODO: "Mis valoraciones" (US-12) no tiene ruta en el panel todavía; enlace provisional -->
    <molecule-management-card
      icon="star"
      link="/user/panel/profile"
      title="Valoraciones"
      [text]="valoracion + ' · 32 valoraciones'">
    </molecule-management-card>
  </div>

  <!-- Publicar nuevo artículo -->
  <div class="profile-cta">
    <atom-button
      config_type="primary"
      icon="plus-lg"
      label="Publicar nuevo artículo"
      (click)="publicar()">
    </atom-button>
  </div>

</section>
