<div class="guest-header w-100">
    <div class="guest-top d-flex align-items-center">

        <button class="btn menu-button d-md-none" type="button" (click)="openMenu()">
            <i class="bi bi-list"></i>
        </button>
                    
        <a [routerLink]="['/home']">
            <img src="logo_white.svg" alt="Buy&Sell" class="logo-img">
        </a>

        <div class="guest-actions d-none d-md-flex align-items-center gap-3">
            <a class="btn login-button" [routerLink]="['/login']">
                Regístrate | Inicia sesión
            </a>

            <a class="btn upload-button" [routerLink]="['/login']">
                <i class="bi bi-plus-lg"></i>
                Subir producto
            </a>
        </div>

    </div>
</div>

@if (isMenuOpen) {
    <app-guest-menu-drawer (closeMenu)="closeMenu()"></app-guest-menu-drawer>
}
